<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>API Health Monitor</title>
        <style>
            /*
             * Apple-inspired Design System
             */
            :root {
                --bg-color: #f5f5f7;
                --card-color: #ffffff;
                --border-color: #e5e5ea;
                --text-primary: #1d1d1f;
                --text-secondary: #86868b;

                --color-blue: #0071e3;
                --color-blue-hover: #0077ed;
                --color-green: #34c759;
                --color-orange: #ff9500;
                --color-red: #ff3b30;

                --radius-sm: 8px;
                --radius-md: 12px;
                --radius-lg: 18px;
                --radius-pill: 999px;

                --shadow-card:
                    0 4px 12px rgba(0, 0, 0, 0.04),
                    0 1px 3px rgba(0, 0, 0, 0.02);
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                background: var(--bg-color);
                color: var(--text-primary);
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    Helvetica, Arial, sans-serif;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
                min-height: 100vh;
                padding: 40px 20px;
                display: flex;
                justify-content: center;
            }

            .mon-wrapper {
                width: 100%;
                max-width: 1024px;
            }

            .mon-card {
                background: var(--card-color);
                border-radius: var(--radius-lg);
                box-shadow: var(--shadow-card);
                padding: 24px;
                margin-bottom: 24px;
            }

            .mon-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 24px;
                padding: 0 8px;
            }

            .mon-logo {
                display: flex;
                align-items: center;
                gap: 12px;
            }

            .mon-pulse {
                width: 10px;
                height: 10px;
                border-radius: 50%;
                background: var(--color-green);
                animation: pulse 2s ease-in-out infinite;
            }

            @keyframes pulse {
                0%,
                100% {
                    box-shadow: 0 0 0 0 rgba(52, 199, 89, 0.4);
                }
                50% {
                    box-shadow: 0 0 0 6px rgba(52, 199, 89, 0);
                }
            }

            .mon-title {
                font-size: 24px;
                font-weight: 600;
                letter-spacing: -0.02em;
            }

            .mon-subtitle {
                font-size: 14px;
                color: var(--text-secondary);
                margin-top: 2px;
            }

            .mon-run-btn {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 10px 20px;
                background: var(--color-blue);
                border: none;
                border-radius: var(--radius-pill);
                color: white;
                font-size: 14px;
                font-weight: 500;
                cursor: pointer;
                transition: all 0.2s ease;
            }

            .mon-run-btn:hover {
                background: var(--color-blue-hover);
                transform: scale(1.02);
            }
            .mon-run-btn:active {
                transform: scale(0.98);
            }
            .mon-run-btn.running {
                opacity: 0.7;
                pointer-events: none;
            }

            .spin {
                display: inline-block;
                animation: spin 0.8s linear infinite;
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }

            .mon-stats {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 16px;
                margin-bottom: 24px;
            }

            .mon-stat-card {
                background: var(--card-color);
                padding: 24px;
                border-radius: var(--radius-lg);
                box-shadow: var(--shadow-card);
                display: flex;
                flex-direction: column;
                justify-content: center;
            }

            .mon-stat-num {
                font-size: 32px;
                font-weight: 600;
                letter-spacing: -0.03em;
                margin-bottom: 4px;
                color: var(--text-primary);
            }

            .mon-stat-label {
                font-size: 13px;
                font-weight: 500;
                color: var(--text-secondary);
            }

            .mon-section-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 16px;
            }

            .mon-section-title {
                font-size: 18px;
                font-weight: 600;
                letter-spacing: -0.01em;
            }

            .mon-table-wrap {
                border-radius: var(--radius-md);
                border: 1px solid var(--border-color);
                overflow: hidden;
            }

            table.mon-table {
                width: 100%;
                border-collapse: collapse;
            }

            table.mon-table th {
                padding: 12px 16px;
                text-align: left;
                font-size: 12px;
                font-weight: 600;
                color: var(--text-secondary);
                text-transform: uppercase;
                letter-spacing: 0.05em;
                border-bottom: 1px solid var(--border-color);
                background: #fafafa;
            }

            table.mon-table td {
                padding: 16px;
                font-size: 14px;
                border-bottom: 1px solid var(--border-color);
                vertical-align: middle;
            }

            table.mon-table tr:last-child td {
                border-bottom: none;
            }
            table.mon-table tbody tr:hover {
                background-color: #fafafa;
            }

            .mon-api-name {
                font-weight: 500;
            }
            .mon-index {
                color: var(--text-secondary);
                font-variant-numeric: tabular-nums;
            }

            /* --- Pagination Controls (Endpoints Only) --- */
            .mon-pagination {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-top: 16px;
                padding: 0 4px;
            }

            .mon-page-info {
                font-size: 13px;
                color: var(--text-secondary);
                font-weight: 500;
            }

            .mon-page-btns {
                display: flex;
                gap: 8px;
            }

            .mon-page-btn {
                padding: 6px 14px;
                border: 1px solid var(--border-color);
                background: var(--card-color);
                border-radius: var(--radius-pill);
                font-size: 13px;
                font-weight: 500;
                color: var(--text-primary);
                cursor: pointer;
                transition: background 0.2s;
            }

            .mon-page-btn:hover:not(:disabled) {
                background: #f0f0f0;
            }
            .mon-page-btn:disabled {
                opacity: 0.4;
                cursor: not-allowed;
            }

            .mon-badge {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                padding: 4px 10px;
                border-radius: var(--radius-pill);
                font-size: 12px;
                font-weight: 600;
                text-transform: uppercase;
            }

            .mon-badge-dot {
                width: 6px;
                height: 6px;
                border-radius: 50%;
            }
            .badge-ok {
                background: #e9f8ee;
                color: #248a3d;
            }
            .badge-ok .mon-badge-dot {
                background: var(--color-green);
            }
            .badge-warn {
                background: #fff4e6;
                color: #b05b00;
            }
            .badge-warn .mon-badge-dot {
                background: var(--color-orange);
            }
            .badge-bad {
                background: #fde8e8;
                color: #c92a2a;
            }
            .badge-bad .mon-badge-dot {
                background: var(--color-red);
            }

            .mon-bar-wrap {
                display: flex;
                align-items: center;
                gap: 12px;
            }
            .mon-bar-bg {
                flex: 1;
                height: 6px;
                background: var(--border-color);
                border-radius: var(--radius-pill);
                overflow: hidden;
            }
            .mon-bar-fill {
                height: 100%;
                border-radius: var(--radius-pill);
                transition: width 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            }
            .mon-speed {
                font-variant-numeric: tabular-nums;
                font-size: 13px;
                color: var(--text-secondary);
                min-width: 45px;
                text-align: right;
            }

            .mon-valid {
                font-weight: 500;
            }
            .mon-valid-ok {
                color: var(--color-green);
            }
            .mon-valid-bad {
                color: var(--color-red);
            }

            .mon-alert {
                display: flex;
                align-items: flex-start;
                gap: 12px;
                padding: 16px;
                border-radius: var(--radius-md);
                margin-bottom: 12px;
                font-size: 14px;
                background: var(--bg-color);
                border: 1px solid var(--border-color);
                animation: fadeIn 0.4s ease;
            }
            .mon-alert:last-child {
                margin-bottom: 0;
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(8px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .mon-alert-lvl {
                font-size: 11px;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.05em;
                padding: 3px 8px;
                border-radius: var(--radius-sm);
                white-space: nowrap;
            }

            .critical .mon-alert-lvl {
                background: var(--color-red);
                color: white;
            }
            .warning .mon-alert-lvl {
                background: var(--color-orange);
                color: white;
            }
            .info .mon-alert-lvl {
                background: var(--text-secondary);
                color: white;
            }

            .mon-empty {
                text-align: center;
                padding: 60px 20px;
                color: var(--text-secondary);
                font-size: 14px;
            }

            @media (max-width: 768px) {
                .mon-stats {
                    grid-template-columns: repeat(2, 1fr);
                }
            }
        </style>
    </head>
    <body>
        <div class="mon-wrapper">
            <!-- Header -->
            <div class="mon-header">
                <div class="mon-logo">
                    <div class="mon-pulse"></div>
                    <div>
                        <div class="mon-title">API Health Monitor</div>
                        <div class="mon-subtitle" id="statusLine">
                            v2.2 · Awaiting check
                        </div>
                    </div>
                </div>
                <div style="display: flex; gap: 10px; align-items: center">
                    <a
                        href="/download-logs"
                        class="mon-run-btn"
                        style="text-decoration: none"
                    >
                        ⬇ Download Logs
                    </a>
                    <button
                        class="mon-run-btn"
                        id="runBtn"
                        onclick="runCheck()"
                    >
                        <span id="btnIcon">▶</span> Run Check
                    </button>
                </div>
            </div>

            <!-- Stats Section -->
            <div class="mon-stats">
                <div class="mon-stat-card">
                    <div class="mon-stat-num" id="total">—</div>
                    <div class="mon-stat-label">Total APIs</div>
                </div>
                <div class="mon-stat-card">
                    <div class="mon-stat-num" id="okCount">—</div>
                    <div class="mon-stat-label">Healthy</div>
                </div>
                <div class="mon-stat-card">
                    <div class="mon-stat-num" id="badCount">—</div>
                    <div class="mon-stat-label">Issues</div>
                </div>
                <div class="mon-stat-card">
                    <div
                        class="mon-stat-num"
                        id="lastRun"
                        style="
                            font-size: 20px;
                            margin-top: 10px;
                            margin-bottom: 6px;
                        "
                    >
                        —
                    </div>
                    <div class="mon-stat-label">Last Run</div>
                </div>
            </div>

            <!-- Endpoints Card -->
            <div class="mon-card">
                <div class="mon-section-header">
                    <div class="mon-section-title">Endpoints</div>
                </div>

                <div class="mon-table-wrap">
                    <table class="mon-table">
                        <thead>
                            <tr>
                                <th width="5%">#</th>
                                <th width="25%">API Name</th>
                                <th width="15%">Status</th>
                                <th width="40%">Latency</th>
                                <th width="15%">Validation</th>
                            </tr>
                        </thead>
                        <tbody id="tbody">
                            <tr>
                                <td colspan="5" class="mon-empty">
                                    Press "Run Check" to fetch live data
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Endpoints Pagination -->
                <div
                    class="mon-pagination"
                    id="pagination"
                    style="display: none"
                >
                    <div class="mon-page-info" id="pageInfo"></div>
                    <div class="mon-page-btns">
                        <button
                            class="mon-page-btn"
                            id="prevBtn"
                            onclick="prevPage()"
                        >
                            Previous
                        </button>
                        <button
                            class="mon-page-btn"
                            id="nextBtn"
                            onclick="nextPage()"
                        >
                            Next
                        </button>
                    </div>
                </div>
            </div>

            <!-- Alerts Card -->
            <div class="mon-card" id="alertsContainer" style="display: none">
                <div class="mon-section-header">
                    <div class="mon-section-title">Alerts</div>
                </div>

                <!-- All sorted alerts for the current run will populate here -->
                <div id="alerts"></div>
            </div>
        </div>

        <script>
            // --- State Management ---
            let allReports = [];
            let allIssues = [];

            // Pagination State for APIs
            let currentPage = 1;
            const itemsPerPage = 10;

            // --- Helpers ---
            function isOk(h) {
                return /healthy|^200$/i.test(String(h));
            }
            function isBad(h) {
                return /faulty|error|fail|timeout|[45]\d\d/i.test(String(h));
            }
            function speedBarColor(ms) {
                if (ms == null) return "transparent";
                return ms < 200
                    ? "var(--color-green)"
                    : ms < 1000
                      ? "var(--color-orange)"
                      : "var(--color-red)";
            }

            // --- API Pagination Logic ---
            function updatePaginationUI() {
                const totalItems = allReports.length;
                const totalPages = Math.ceil(totalItems / itemsPerPage);

                if (totalItems > itemsPerPage) {
                    document.getElementById("pagination").style.display =
                        "flex";
                    const startItem = (currentPage - 1) * itemsPerPage + 1;
                    const endItem = Math.min(
                        currentPage * itemsPerPage,
                        totalItems,
                    );
                    document.getElementById("pageInfo").textContent =
                        `Showing ${startItem}-${endItem} of ${totalItems}`;
                    document.getElementById("prevBtn").disabled =
                        currentPage === 1;
                    document.getElementById("nextBtn").disabled =
                        currentPage === totalPages;
                } else {
                    document.getElementById("pagination").style.display =
                        "none";
                }
            }

            function prevPage() {
                if (currentPage > 1) {
                    currentPage--;
                    renderTable();
                }
            }

            function nextPage() {
                const totalPages = Math.ceil(allReports.length / itemsPerPage);
                if (currentPage < totalPages) {
                    currentPage++;
                    renderTable();
                }
            }

            // --- Render Logic ---
            function renderTable() {
                const tbody = document.getElementById("tbody");
                tbody.innerHTML = "";

                const start = (currentPage - 1) * itemsPerPage;
                const paginatedReports = allReports.slice(
                    start,
                    start + itemsPerPage,
                );

                paginatedReports.forEach((api, index) => {
                    const absoluteIndex = start + index + 1;
                    const health = String(api.health || api.Health || "");
                    const name = api.name || api.Name || "—";
                    const speed = api.speed ?? null;
                    const valid = api.valid || "—";

                    const ok = isOk(health);
                    const bad = !ok && isBad(health);

                    const badgeClass = ok
                        ? "badge-ok"
                        : bad
                          ? "badge-bad"
                          : "badge-warn";
                    const badgeLabel = ok
                        ? "Healthy"
                        : bad
                          ? "Error"
                          : "Warning";

                    const speedLabel = speed != null ? `${speed}ms` : "—";
                    const barColor = speedBarColor(speed);
                    const barW =
                        speed != null ? Math.min(100, (speed / 3500) * 100) : 0;

                    const validClass =
                        valid === "OK"
                            ? "mon-valid mon-valid-ok"
                            : valid === "FAIL"
                              ? "mon-valid mon-valid-bad"
                              : "mon-valid";

                    const tr = document.createElement("tr");
                    tr.innerHTML = `
                    <td class="mon-index">${String(absoluteIndex).padStart(2, "0")}</td>
                    <td class="mon-api-name">${name}</td>
                    <td>
                        <span class="mon-badge ${badgeClass}">
                            <span class="mon-badge-dot"></span>${badgeLabel}
                        </span>
                    </td>
                    <td>
                        <div class="mon-bar-wrap">
                            <div class="mon-bar-bg">
                                <div class="mon-bar-fill" style="width:${barW}%; background:${barColor};"></div>
                            </div>
                            <span class="mon-speed">${speedLabel}</span>
                        </div>
                    </td>
                    <td class="${validClass}">${valid}</td>
                `;
                    tbody.appendChild(tr);
                });

                updatePaginationUI();
            }

            function renderAlerts() {
                const alertBox = document.getElementById("alerts");
                const alertsContainer =
                    document.getElementById("alertsContainer");

                alertBox.innerHTML = "";

                if (allIssues && allIssues.length > 0) {
                    alertsContainer.style.display = "block";

                    // Strictly sort: CRITICAL (0) -> WARNING (1) -> INFO (2)
                    const severityMap = { CRITICAL: 0, WARNING: 1, INFO: 2 };
                    let sortedIssues = [...allIssues].sort((a, b) => {
                        const weightA =
                            severityMap[a.level] !== undefined
                                ? severityMap[a.level]
                                : 3;
                        const weightB =
                            severityMap[b.level] !== undefined
                                ? severityMap[b.level]
                                : 3;
                        return weightA - weightB;
                    });

                    // Render all sorted alerts for THIS run
                    sortedIssues.forEach((issue) => {
                        const cls =
                            issue.level === "CRITICAL"
                                ? "critical"
                                : issue.level === "WARNING"
                                  ? "warning"
                                  : "info";
                        const div = document.createElement("div");
                        div.className = `mon-alert ${cls}`;
                        div.innerHTML = `
                        <span class="mon-alert-lvl">${issue.level}</span>
                        <span><strong>${issue.api}</strong> — ${issue.message}</span>
                    `;
                        alertBox.appendChild(div);
                    });
                } else {
                    alertsContainer.style.display = "none";
                }
            }

            function updateDashboard(isRestoring = false, restoredTime = null) {
                let okCount = 0;
                allReports.forEach((api) => {
                    if (isOk(api.health || api.Health)) okCount++;
                });

                document.getElementById("total").textContent =
                    allReports.length;
                document.getElementById("okCount").textContent = okCount;
                document.getElementById("badCount").textContent =
                    allReports.length - okCount;

                let now;
                if (isRestoring && restoredTime) {
                    now = new Date(parseInt(restoredTime));
                    document.getElementById("statusLine").textContent =
                        "v2.2 · Restored from cache";
                } else {
                    now = new Date();
                    document.getElementById("statusLine").textContent =
                        "v2.2 · Live";

                    localStorage.setItem(
                        "mon_reports",
                        JSON.stringify(allReports),
                    );
                    localStorage.setItem(
                        "mon_issues",
                        JSON.stringify(allIssues),
                    );
                    localStorage.setItem("mon_lastRun", now.getTime());
                }

                document.getElementById("lastRun").textContent =
                    now.toLocaleTimeString([], {
                        hour: "2-digit",
                        minute: "2-digit",
                        second: "2-digit",
                    });

                // Reset pagination to page 1 on fresh data fetch
                if (!isRestoring) {
                    currentPage = 1;
                }

                renderTable();
                renderAlerts();
            }

            async function runCheck() {
                const btn = document.getElementById("runBtn");
                const icon = document.getElementById("btnIcon");
                btn.classList.add("running");
                icon.innerHTML = '<span class="spin">↻</span>';
                document.getElementById("statusLine").textContent =
                    "v2.2 · Checking...";

                try {
                    const res = await fetch("/run-check");
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const data = await res.json();

                    // This STRICTLY replaces the arrays with new data, dropping older alerts
                    allReports = data.reports || [];
                    allIssues = data.issues || [];
                    updateDashboard();
                } catch (err) {
                    console.error("Fetch failed:", err);
                    document.getElementById("statusLine").textContent =
                        "v2.2 · Fetch Error";
                } finally {
                    setTimeout(() => {
                        btn.classList.remove("running");
                        icon.textContent = "▶";
                    }, 800);
                }
            }

            // Restore on page load
            window.addEventListener("DOMContentLoaded", () => {
                const storedReports = localStorage.getItem("mon_reports");
                const storedIssues = localStorage.getItem("mon_issues");
                const storedTime = localStorage.getItem("mon_lastRun");

                if (storedReports && storedIssues && storedTime) {
                    try {
                        allReports = JSON.parse(storedReports);
                        allIssues = JSON.parse(storedIssues);
                        updateDashboard(true, storedTime);
                    } catch (e) {
                        console.error("Error parsing local storage.", e);
                    }
                }
            });
        </script>
    </body>
</html>
