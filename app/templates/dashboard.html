<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Health Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:      #0d0f12;
            --surface: #13161b;
            --card:    #181c22;
            --border:  rgba(255,255,255,0.07);
            --border2: rgba(255,255,255,0.13);
            --text:    #e2e6f0;
            --muted:   #6b7280;
            --hint:    #4b5261;
            --accent:  #1D9E75;
            --ok:      #22c97e;
            --ok-bg:   rgba(34,201,126,0.12);
            --ok-br:   rgba(34,201,126,0.3);
            --warn:    #f59e0b;
            --warn-bg: rgba(245,158,11,0.12);
            --warn-br: rgba(245,158,11,0.3);
            --bad:     #f03e5a;
            --bad-bg:  rgba(240,62,90,0.12);
            --bad-br:  rgba(240,62,90,0.35);
            --blue:    #4da6ff;
            --mono: 'JetBrains Mono', 'Courier New', monospace;
            --sans: 'Syne', 'Arial Black', sans-serif;
        }

        html, body {
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: var(--mono);
            font-size: 14px;
            line-height: 1.5;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: radial-gradient(circle, rgba(255,255,255,0.055) 1px, transparent 1px);
            background-size: 28px 28px;
            pointer-events: none; z-index: 0;
        }

        /* ── TOP BAR ── */
        .topbar {
            position: relative; z-index: 10;
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px 28px;
            background: var(--card);
            border-bottom: 1px solid var(--border2);
        }
        .brand { display: flex; align-items: center; gap: 13px; }
        .dot-wrap { position: relative; width: 16px; height: 16px; flex-shrink: 0; }
        .dot-inner {
            position: absolute; inset: 4px;
            background: var(--accent); border-radius: 50%;
            box-shadow: 0 0 8px var(--accent);
        }
        .dot-ring {
            position: absolute; inset: 0;
            border: 1.5px solid var(--accent); border-radius: 50%;
            animation: pulse 2.2s ease-out infinite; opacity: 0;
        }
        @keyframes pulse { 0%{transform:scale(.7);opacity:.9} 100%{transform:scale(2.5);opacity:0} }
        .brand-name {
            font-family: var(--sans); font-size: 16px; font-weight: 800;
            letter-spacing: -.01em; color: #fff; line-height: 1;
        }
        .brand-sub {
            font-size: 10px; color: var(--hint);
            letter-spacing: .13em; text-transform: uppercase; margin-top: 3px;
        }
        .topbar-right { display: flex; align-items: center; gap: 10px; }
        .status-pill {
            padding: 5px 13px; border-radius: 20px;
            font-size: 10px; font-weight: 600;
            letter-spacing: .1em; text-transform: uppercase;
            background: var(--surface); border: 1px solid var(--border2);
            color: var(--muted); transition: all .2s; font-family: var(--mono);
        }
        .status-pill.scanning { color:var(--warn); background:var(--warn-bg); border-color:var(--warn-br); animation:blink .9s step-end infinite; }
        .status-pill.done     { color:var(--ok);   background:var(--ok-bg);   border-color:var(--ok-br); }
        .status-pill.error    { color:var(--bad);  background:var(--bad-bg);  border-color:var(--bad-br); }
        @keyframes blink { 50%{opacity:.3} }
        .run-btn {
            display: flex; align-items: center; gap: 7px;
            padding: 8px 18px; background: var(--accent); color: #fff;
            border: none; border-radius: 6px; font-family: var(--mono);
            font-size: 12px; font-weight: 600; letter-spacing: .04em;
            cursor: pointer; transition: opacity .15s, transform .1s;
        }
        .run-btn:hover:not(:disabled) { opacity: .82; }
        .run-btn:active:not(:disabled) { transform: scale(.97); }
        .run-btn:disabled { opacity: .45; cursor: not-allowed; }
        .run-btn.spin svg { animation: spin .7s linear infinite; }
        @keyframes spin { to{transform:rotate(360deg)} }

        /* ── STATS ── */
        .stats-row {
            position: relative; z-index: 5;
            display: grid; grid-template-columns: repeat(4,1fr);
            border-bottom: 1px solid var(--border2);
        }
        .stat {
            padding: 18px 22px; text-align: center;
            background: var(--surface); border-right: 1px solid var(--border);
        }
        .stat:last-child { border-right: none; }
        .stat-n { font-family:var(--sans); font-size:28px; font-weight:800; color:#fff; line-height:1; }
        .stat-n.ok  { color: var(--ok); }
        .stat-n.bad { color: var(--bad); }
        .stat-n.sm  { font-size:13px; font-family:var(--mono); font-weight:600; line-height:2.1; }
        .stat-l { font-size:10px; color:var(--hint); text-transform:uppercase; letter-spacing:.11em; margin-top:5px; }

        /* ── BODY ── */
        .body {
            position: relative; z-index: 5;
            padding: 22px 28px;
            display: flex; flex-direction: column; gap: 16px;
            min-height: calc(100vh - 170px);
        }
        .empty {
            display:flex; flex-direction:column; align-items:center;
            justify-content:center; padding:70px 20px; gap:12px; color:var(--muted);
        }
        .empty-icon { font-size:36px; opacity:.18; line-height:1; }
        .empty p { font-size:13px; text-align:center; }
        .empty strong { color:var(--text); font-weight:600; }

        /* ── TABLE ── */
        .tbl-wrap { border:1px solid var(--border2); border-radius:10px; overflow:hidden; }
        table { width:100%; border-collapse:collapse; table-layout:fixed; }
        thead { background: var(--surface); }
        th {
            padding:11px 15px; font-size:10px; font-weight:600;
            letter-spacing:.13em; text-transform:uppercase;
            color:var(--hint); text-align:left; border-bottom:1px solid var(--border2);
        }
        th:first-child { width:44px; }
        th:nth-child(3), th:nth-child(4), th:nth-child(5) { width:118px; }
        td {
            padding:12px 15px; font-size:12px; vertical-align:middle;
            border-bottom:1px solid var(--border);
            overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
        }
        tbody tr:last-child td { border-bottom:none; }
        tbody tr { transition:background .1s; }
        tbody tr:hover td { background:rgba(255,255,255,0.025); }
        .td-idx  { color:var(--hint); font-size:10px; }
        .td-name { font-weight:600; font-size:13px; color:#fff; }
        .td-spd  { color:var(--blue); }
        .badge {
            display:inline-block; padding:3px 9px; border-radius:20px;
            font-size:10px; font-weight:600; letter-spacing:.04em; text-transform:uppercase;
        }
        .b-ok   { background:var(--ok-bg);   color:var(--ok);   border:1px solid var(--ok-br); }
        .b-bad  { background:var(--bad-bg);  color:var(--bad);  border:1px solid var(--bad-br); }
        .b-warn { background:var(--warn-bg); color:var(--warn); border:1px solid var(--warn-br); }
        .val-ok  { color:var(--ok); }
        .val-bad { color:var(--bad); }

        /* ── ALERTS ── */
        .alerts { border:1px solid var(--bad-br); border-radius:8px; overflow:hidden; }
        .alert-hdr {
            display:flex; align-items:center; gap:8px;
            padding:10px 15px; background:var(--bad-bg); border-bottom:1px solid var(--bad-br);
            font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.11em; color:var(--bad);
        }
        .alert-list { list-style:none; padding:0; }
        .alert-list li {
            display:flex; align-items:flex-start; gap:8px;
            padding:9px 15px; font-size:12px; color:#f07082;
            border-top:1px solid rgba(240,62,90,.1);
        }
        .alert-list li:first-child { border-top:none; }
        .alert-list li::before { content:'›'; color:var(--bad); font-weight:700; flex-shrink:0; }

        /* ── FOOTER ── */
        .footer {
            position:relative; z-index:5;
            display:flex; justify-content:space-between; align-items:center;
            padding:10px 28px; background:var(--card); border-top:1px solid var(--border);
            font-size:10px; color:var(--hint); letter-spacing:.05em;
        }

        @media (max-width:640px) {
            .topbar,.body,.footer { padding-left:14px; padding-right:14px; }
            .stats-row { grid-template-columns:repeat(2,1fr); }
            .stat:nth-child(2) { border-right:none; }
            .brand-sub { display:none; }
            th:nth-child(4), td:nth-child(4) { display:none; }
        }
    </style>
</head>
<body>

<div class="topbar">
    <div class="brand">
        <div class="dot-wrap">
            <div class="dot-inner"></div>
            <div class="dot-ring"></div>
        </div>
        <div>
            <div class="brand-name">API Health Monitor</div>
            <div class="brand-sub">Endpoint Surveillance</div>
        </div>
    </div>
    <div class="topbar-right">
        <div class="status-pill" id="sp">Ready</div>
        <button class="run-btn" id="runBtn" onclick="runCheck()">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21"/></svg>
            Run Check
        </button>
    </div>
</div>

<div class="stats-row">
    <div class="stat"><div class="stat-n" id="sTotal">—</div><div class="stat-l">Total APIs</div></div>
    <div class="stat"><div class="stat-n ok" id="sOk">—</div><div class="stat-l">Healthy</div></div>
    <div class="stat"><div class="stat-n bad" id="sBad">—</div><div class="stat-l">Issues</div></div>
    <div class="stat"><div class="stat-n sm" id="sTime">—</div><div class="stat-l">Last Check</div></div>
</div>

<div class="body">
    <div class="empty" id="emptyState">
        <div class="empty-icon">◈</div>
        <p>No data yet — click <strong>Run Check</strong> to begin monitoring.</p>
    </div>

    <div class="tbl-wrap" id="tblWrap" style="display:none">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>API Name</th>
                    <th>Health</th>
                    <th>Speed</th>
                    <th>Validity</th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>

    <div class="alerts" id="alertsBox" style="display:none">
        <div class="alert-hdr">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
                <line x1="12" y1="9" x2="12" y2="13"/>
                <line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
            Alerts
        </div>
        <ul class="alert-list" id="alertList"></ul>
    </div>
</div>

<div class="footer">
    <span>API Health Monitor</span>
    <span id="footTs"></span>
</div>

<script>
    function isOk(h)  { return /\b(200|ok|up|healthy)\b/i.test(h); }
    function isBad(h) { return /\b(down|error|fail|timeout|[45]\d\d)\b/i.test(h); }

    async function runCheck() {
        const btn = document.getElementById("runBtn");
        const sp  = document.getElementById("sp");
        btn.disabled = true;
        btn.classList.add("spin");
        sp.className   = "status-pill scanning";
        sp.textContent = "Scanning...";
        try {
            const r = await fetch("/run-check");
            if (!r.ok) throw new Error("HTTP " + r.status);
            const d = await r.json();
            render(d.reports, d.issues);
            sp.className   = "status-pill done";
            sp.textContent = "Done ✓";
        } catch (e) {
            sp.className   = "status-pill error";
            sp.textContent = "Error ✗";
            console.error(e);
        } finally {
            btn.disabled = false;
            btn.classList.remove("spin");
        }
    }

    function render(reports, issues) {
        const t  = new Date().toLocaleTimeString();
        const ok = reports.filter(r => isOk(String(r.Health ?? r.health ?? ""))).length;
        document.getElementById("sTotal").textContent  = reports.length;
        document.getElementById("sOk").textContent    = ok;
        document.getElementById("sBad").textContent   = reports.length - ok;
        document.getElementById("sTime").textContent  = t;
        document.getElementById("footTs").textContent = "Last run: " + t;

        const tbody = document.getElementById("tbody");
        tbody.innerHTML = "";
        reports.forEach((api, i) => {
            const name     = api.Name     ?? api.name     ?? "—";
            const health   = String(api.Health   ?? api.health   ?? "—");
            const speed    = String(api.Speed    ?? api.speed    ?? "—");
            const validity = String(api.Validity ?? api.validity ?? "—");
            const good  = isOk(health), bad = isBad(health);
            const valOk = /valid/i.test(validity) && !/invalid/i.test(validity);
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td class="td-idx">${String(i+1).padStart(2,"0")}</td>
                <td class="td-name">${esc(name)}</td>
                <td><span class="badge ${good?"b-ok":bad?"b-bad":"b-warn"}">${esc(health)}</span></td>
                <td class="td-spd">${esc(speed)}</td>
                <td class="${valOk?"val-ok":"val-bad"}">${esc(validity)}</td>`;
            tbody.appendChild(tr);
        });

        document.getElementById("emptyState").style.display = "none";
        document.getElementById("tblWrap").style.display    = "block";

        const ab = document.getElementById("alertsBox");
        const al = document.getElementById("alertList");
        if (issues && issues.length) {
            ab.style.display = "block";
            al.innerHTML = "";
            issues.forEach(iss => {
                const li = document.createElement("li");
                li.textContent = iss;
                al.appendChild(li);
            });
        } else {
            ab.style.display = "none";
        }
    }

    function esc(s) {
        return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }
</script>
<script>
async function loadHealthData() {
    try {
        const response = await fetch("/run-check");
        const data = await response.json();

        console.log(data); // debug check

        document.getElementById("reports").innerText =
            JSON.stringify(data.Reports, null, 2);

        document.getElementById("issues").innerText =
            JSON.stringify(data.Issues, null, 2);

    } catch (error) {
        console.error("Error fetching data:", error);
    }
}

// run once when page loads
loadHealthData();

// optional: auto refresh every 10 seconds
setInterval(loadHealthData, 10000);
</script>
</body>
</html>
